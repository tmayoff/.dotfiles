theme = "catppuccin_macchiato"

[editor]
auto-format = false
#gutters = ["line-numbers", "diagnostics", "diff"]

[editor.file-picker]
git-ignore = false

[editor.lsp]
display-inlay-hints = true

[editor.cursor-shape]
insert = "bar"

[keys.normal]
C-right = "move_next_word_start"
C-left = "move_prev_word_end"
a = "insert_mode"
i = "append_mode"
"=" = ":format"

[keys.insert]
C-right = "move_next_word_start"
C-left = "move_prev_word_end"
